<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Family Cookbook</title>
  <meta name="description" content="Our family recipe collection — extracted, converted to Hong Kong metric units, and neatly organized by type." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800;900&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="#/">
        <span class="brand-mark">🍳</span>
        <span class="brand-text">
          <span class="brand-title">The Family Cookbook</span>
          <span class="brand-sub">Everything we love to cook</span>
        </span>
      </a>
      <div class="header-actions">
        <div class="lang-switch" id="lang-switch" role="group" aria-label="Language">
          <button type="button" data-lang="en">EN</button>
          <button type="button" data-lang="su">Suroboyoan</button>
        </div>
        <input id="search" class="search" type="search" placeholder="Search recipes, ingredients…" autocomplete="off" />
      </div>
    </div>
  </header>

  <main id="app" class="wrap">
    <div class="loading">Loading the cookbook…</div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>Add a recipe by pasting any link (website, Instagram, YouTube, TikTok…) to Claude. Ingredients are converted to Hong Kong metric units (g · ml · °C).</p>
      <p class="muted"><span id="recipe-count">0</span> recipes · Free &amp; open · Hosted on GitHub Pages</p>
    </div>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
